<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unofficial Atlassian Content Stream</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header>
    <h1>Unofficial Atlassian Content Feed</h1>
    <p class="subtitle">Latest content and news from the Atlassian ecosystem</p>
  </header>
  <nav class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="news">News</button>
  </nav>
  <main id="feed">
    <p id="loading">Loading&hellip;</p>
    <p id="error" hidden></p>
    <p id="empty" hidden>No entries yet.</p>
  </main>
  <button id="load-more" hidden>Load More</button>
  <footer>
    <p>Post summaries are AI-generated. Please double-check content.</p>
  </footer>
</body>
</html>
