<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlassian Content Stream</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header>
    <h1>Atlassian Content Stream</h1>
    <p class="subtitle">Latest content from across the Atlassian ecosystem</p>
  </header>
  <main id="feed">
    <p id="loading">Loading&hellip;</p>
    <p id="error" hidden></p>
    <p id="empty" hidden>No entries yet.</p>
  </main>
  <button id="load-more" hidden>Load More</button>
  <footer>
    <p>Summaries are AI-generated. Please double-check content.</p>
  </footer>
</body>
</html>
